{% load static %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'css/blog.css' %}" />
  </head>
  <body>
    <div class="top-menu-div">
      <div class="logo-div">
        <div class="bp">
          <h1>
            <a class="logo" href="/">Django Girls Blog</a> /
            <a class="logo" href="{% url 'polls:index' %}">Go To Polls</a>
          </h1>
        </div>
      </div>
    </div>
    <div class="big_login_form">
      <div class="login_form">
        <form action="{% url 'login' %}" method="post">
          {% csrf_token %}
          <!-- <div class="form-group col-md-6">
            <label for="inputEmail4">username:</label>
            <input
              type="text"
              class="form-control"
              id="inputEmail4"
              name="text"
              required
            />
          </div> -->
          <br />
          <div class="form-group col-md-6">
            <label for="inputEmail4">Email:</label>
            <input
              type="email"
              class="form-control"
              id="inputEmail4"
              name="email"
              required
            />
          </div>
          <br />
          <div class="form-group col-md-6">
            <label for="inputPassword4">password:</label>
            <input
              type="password"
              class="form-control"
              id="inputPassword4"
              required
              name="password"
            />
          </div>
          {% if errors %}
          <div style="color: red">
            {% for e in errors %}
            <p>{{ e }}</p>
            {% endfor %}
          </div>
          {% endif %}
          <br />
          <button type="submit" class="login_button">Login</button>
          <p>
            if you don't have an account create a new one
            <span><a class="" href="{% url 'signup' %}">signup</a></span>
          </p>
        </form>
      </div>
    </div>
  </body>
</html>
